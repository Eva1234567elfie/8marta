<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>С 8 марта</title>

<style>

body,html{
margin:0;
padding:0;
overflow:hidden;
background:black;
font-family:Arial;
color:white;
text-align:center;
}

/* стартовый экран */

#start{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
cursor:pointer;
}

/* падающие сердечки */

.heart{
position:absolute;
font-size:16px;
color:#ff4d6d;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-100px)}
100%{transform:translateY(110vh)}
}

/* отсчёт */

#countdown{
position:absolute;
top:40%;
width:100%;
font-size:120px;
color:#ff99aa;
display:none;
}

/* текст */

#text{
position:absolute;
top:40%;
width:100%;
font-size:80px;
color:#ff4d6d;
display:none;
}

/* фото */

.photo{
width:320px;
height:420px;
object-fit:cover;
border-radius:20px;
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
cursor:pointer;
transition:all 1s;
box-shadow:0 0 30px rgba(255,80,120,0.4);
}

</style>
</head>

<body>

<div id="start">
<h1>С 8 марта!</h1>
<p>Нажми чтобы продолжить</p>
</div>

<div id="countdown"></div>
<div id="text"></div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* падающие сердечки */

function startHearts(){

for(let i=0;i<60;i++){

let h=document.createElement("div")

h.className="heart"

h.innerText="❤️"

h.style.left=Math.random()*100+"%"

h.style.animationDuration=(3+Math.random()*4)+"s"

document.body.appendChild(h)

}

}

/* старт */

document.getElementById("start").onclick=()=>{

document.getElementById("start").style.display="none"

document.getElementById("music").play()

startHearts()

setTimeout(countdown,2000)

}

/* отсчёт */

function countdown(){

let el=document.getElementById("countdown")

el.style.display="block"

let n=3

let i=setInterval(()=>{

el.innerText=n

n--

if(n<0){

clearInterval(i)

showText()

}

},1000)

}

/* текст */

function showText(){

document.getElementById("countdown").style.display="none"

let t=document.getElementById("text")

t.style.display="block"

let words=["С","8","Марта","Аленка"]

let i=0

let inter=setInterval(()=>{

t.innerText=words[i]

i++

if(i>=words.length){

clearInterval(inter)

setTimeout(startPhotos,1500)

}

},1200)

}

/* список фото */

let photos=[]

for(let i=1;i<=30;i++){

photos.push("photo"+i+".jpg")

}

let index=0

/* показ фото */

function startPhotos(){

document.getElementById("text").style.display="none"

let img=document.createElement("img")

img.src=photos[index]

img.className="photo"

document.body.appendChild(img)

img.onclick=()=>{

index++

if(index<photos.length){

img.src=photos[index]

}else{

makeHeart()

}

}

}

/* финальное сердце */

function makeHeart(){

let imgs=[]

document.querySelectorAll(".photo").forEach(e=>e.remove())

photos.forEach(p=>{

let img=document.createElement("img")

img.src=p

img.className="photo"

img.style.left="50%"

img.style.top="50%"

document.body.appendChild(img)

imgs.push(img)

})

/* разлёт */

setTimeout(()=>{

imgs.forEach(img=>{

img.style.left=Math.random()*100+"%"

img.style.top=Math.random()*100+"%"

})

},200)

/* собираем сердце */

setTimeout(()=>{

let coords=[]

for(let t=0;t<Math.PI*2;t+=0.2){

let x=16*Math.pow(Math.sin(t),3)

let y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)

coords.push([x,y])

}

imgs.forEach((img,i)=>{

let c=coords[i%coords.length]

img.style.left=(50+c[0]*1.6)+"%"
img.style.top=(45-c[1]*1.6)+"%"

/* уменьшаем фото */
img.style.width="120px"
img.style.height="160px"

})

},1500)

}

</script>

</body>
</html>
